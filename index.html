<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Band 7+ 필수 어휘 100</title>
<style>
  :root{
    --pink-1:#ffe3ec;
    --pink-2:#ffb3c6;
    --pink-3:#ff7aa2;
    --pink-deep:#e8547a;
    --purple:#8e7bd1;
    --ink:#3a2e3f;
    --card:#ffffff;
    --good:#3fb27f;
    --bad:#e8547a;
    --shadow: 0 10px 30px rgba(232,84,122,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family: "Apple SD Gothic Neo","Malgun Gothic","Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;
    background: linear-gradient(160deg, var(--pink-1) 0%, #fff 40%, #eee6ff 100%);
    color: var(--ink);
    display:flex;
    justify-content:center;
    padding: 24px 16px 60px;
  }
  .app{
    width:100%;
    max-width:720px;
  }
  header.top{
    text-align:center;
    margin-bottom:24px;
  }
  header.top h1{
    font-size:1.6rem;
    margin:0 0 6px;
    background: linear-gradient(90deg,var(--pink-3),var(--purple));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  header.top p{
    margin:0;
    color:#8a7d90;
    font-size:0.92rem;
  }
  .screen{ display:none; animation: fadein .35s ease; }
  .screen.active{ display:block; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .card{
    background:var(--card);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:24px;
  }

  /* ---- Category select ---- */
  .cat-grid{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:12px;
    margin-top:16px;
  }
  @media (max-width:480px){ .cat-grid{grid-template-columns:1fr;} }
  .cat-btn{
    text-align:left;
    border:2px solid #ffe0ea;
    background:#fff;
    border-radius:14px;
    padding:14px 16px;
    cursor:pointer;
    transition: all .15s ease;
    font-family:inherit;
  }
  .cat-btn:hover{ border-color:var(--pink-3); transform:translateY(-2px); box-shadow:0 6px 14px rgba(232,84,122,0.12); }
  .cat-btn .num{ font-size:.75rem; color:var(--pink-3); font-weight:700; }
  .cat-btn .name{ font-size:.95rem; font-weight:600; margin-top:2px; }
  .cat-btn .best{ font-size:.75rem; color:#a89aa8; margin-top:4px; }
  .all-btn{
    margin-top:18px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background: linear-gradient(90deg,var(--pink-3),var(--purple));
    color:#fff;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
  }
  .all-btn:hover{ filter:brightness(1.05); }

  /* ---- Mode toggle ---- */
  .mode-toggle{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .mode-toggle button{
    flex:1;
    padding:10px 12px;
    border-radius:12px;
    border:2px solid #ffe0ea;
    background:#fff;
    color:#a89aa8;
    font-weight:700;
    font-size:.9rem;
    cursor:pointer;
    font-family:inherit;
  }
  .mode-toggle button.active{
    border-color:transparent;
    background: linear-gradient(90deg,var(--pink-3),var(--purple));
    color:#fff;
  }

  /* ---- Study (뜻 보기) ---- */
  .study-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
  }
  .study-header h2{ font-size:1.05rem; margin:0; }
  .study-list{ display:flex; flex-direction:column; gap:10px; max-height:70vh; overflow-y:auto; }
  .study-item{
    padding:14px 16px;
    border-radius:14px;
    background:#fff7f9;
    border:1px solid #ffe0ea;
  }
  .study-item .w-row{ display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
  .study-item .w-word{ font-size:1.05rem; font-weight:800; color:var(--pink-deep); }
  .study-item .w-pos{ font-size:.75rem; color:#a89aa8; }
  .study-item .w-meaning{ font-size:.9rem; color:var(--ink); margin-bottom:6px; }
  .study-item .w-sentence{ font-size:.88rem; color:#8a7d90; line-height:1.5; }
  .study-item .w-sentence mark{ background:#ffe0ea; color:var(--pink-deep); font-weight:700; border-radius:4px; padding:0 3px; }

  /* ---- Quiz ---- */
  .progress-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .progress-bar{
    flex:1;
    height:8px;
    background:#ffe3ec;
    border-radius:6px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: linear-gradient(90deg,var(--pink-3),var(--purple));
    width:0%;
    transition: width .3s ease;
  }
  .progress-label{ font-size:.8rem; color:#a89aa8; white-space:nowrap; }

  .q-meta{ font-size:.78rem; color:var(--pink-3); font-weight:700; margin-bottom:6px; }
  .q-hint{ font-size:.85rem; color:#8a7d90; margin-bottom:14px; }
  .q-sentence{ font-size:1.15rem; line-height:1.6; margin-bottom:20px; }
  .blank{
    display:inline-block;
    min-width:90px;
    border-bottom:2px solid var(--pink-3);
    text-align:center;
    font-weight:700;
    color:var(--pink-deep);
  }

  .answer-input-row{ display:flex; gap:8px; }
  .answer-input{
    flex:1;
    padding:12px 14px;
    border-radius:12px;
    border:2px solid #ffe0ea;
    font-size:1rem;
    font-family:inherit;
  }
  .answer-input:focus{ outline:none; border-color:var(--pink-3); }

  .hint-row{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .hint-btn{
    padding:8px 12px;
    border-radius:10px;
    border:2px solid #ffe0ea;
    background:#fff;
    color:var(--pink-deep);
    font-size:.82rem;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
  }
  .hint-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .hint-text{ font-size:.9rem; font-weight:700; letter-spacing:1px; color:var(--purple); }

  .mc-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:480px){ .mc-grid{grid-template-columns:1fr;} }
  .mc-opt{
    padding:12px 14px;
    border-radius:12px;
    border:2px solid #ffe0ea;
    background:#fff;
    cursor:pointer;
    font-size:.95rem;
    font-family:inherit;
    text-align:left;
  }
  .mc-opt:hover{ border-color:var(--pink-3); }
  .mc-opt.correct{ border-color:var(--good); background:#eafff4; }
  .mc-opt.wrong{ border-color:var(--bad); background:#ffeef1; }

  .btn{
    padding:12px 18px;
    border-radius:12px;
    border:none;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{ background: linear-gradient(90deg,var(--pink-3),var(--purple)); color:#fff; }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-ghost{ background:#fff; color:var(--pink-deep); border:2px solid #ffe0ea; }

  .feedback{
    margin-top:16px;
    padding:14px 16px;
    border-radius:12px;
    font-size:.92rem;
    display:none;
  }
  .feedback.show{ display:block; }
  .feedback.correct{ background:#eafff4; color:#237a53; }
  .feedback.wrong{ background:#ffeef1; color:var(--pink-deep); }
  .feedback .ans{ font-weight:700; }

  .quiz-footer{ display:flex; justify-content:space-between; margin-top:18px; }

  /* ---- Result ---- */
  .result-score{ text-align:center; margin:10px 0 20px; }
  .result-score .big{ font-size:2.4rem; font-weight:800; color:var(--pink-deep); }
  .result-score .sub{ color:#8a7d90; font-size:.9rem; margin-top:4px; }

  .wrong-list{ margin-top:18px; }
  .wrong-list h3{ font-size:.95rem; margin-bottom:10px; }
  .wrong-item{
    display:flex; justify-content:space-between;
    padding:10px 12px; border-radius:10px; background:#fff7f9;
    margin-bottom:6px; font-size:.88rem;
  }
  .wrong-item b{ color:var(--pink-deep); }

  .letter-btn{
    margin-top:26px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background: linear-gradient(90deg,#ff9eb5,var(--purple));
    color:#fff;
    font-size:1.05rem;
    font-weight:800;
    cursor:pointer;
  }
  .letter-box{
    display:none;
    margin-top:20px;
    padding:22px;
    border-radius:16px;
    background:#fff0f5;
    border:2px dashed var(--pink-2);
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .letter-box.show{ display:block; animation: fadein .5s ease; }
  .letter-box p{ font-size:1.05rem; line-height:1.7; margin:0 0 6px; position:relative; z-index:2; }
  .letter-box .signature{ margin-top:12px; font-size:.85rem; color:#a35a72; position:relative; z-index:2; }

  .heart{
    position:absolute;
    top:-20px;
    font-size:1.2rem;
    animation: fall linear forwards;
    z-index:1;
  }
  @keyframes fall{
    to{ transform: translateY(220px) rotate(360deg); opacity:0; }
  }

  .result-actions{ display:flex; gap:10px; margin-top:20px; }
  .result-actions .btn{ flex:1; }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>IELTS Band 7+ 필수 어휘 100</h1>
    <p>예문으로 익히는 라이팅 고득점 어휘 퀴즈</p>
  </header>

  <!-- Category select screen -->
  <section id="screen-select" class="screen active">
    <div class="card">
      <div class="mode-toggle">
        <button id="modeQuizBtn" class="active">🧠 퀴즈로 풀기</button>
        <button id="modeStudyBtn">📖 뜻 보기 학습</button>
      </div>
      <p style="margin:0 0 4px; font-weight:700;" id="selectTitle">카테고리를 골라서 풀어보세요</p>
      <p style="margin:0; font-size:.85rem; color:#a89aa8;" id="selectSub">각 카테고리 10문제 · 빈칸/객관식 랜덤 출제</p>
      <div class="cat-grid" id="catGrid"></div>
      <button class="all-btn" id="allBtn">전체 100문제 도전하기 💪</button>
    </div>
  </section>

  <!-- Study (뜻 보기) screen -->
  <section id="screen-study" class="screen">
    <div class="card">
      <div class="study-header">
        <h2 id="studyTitle">단어 목록</h2>
        <button class="btn btn-ghost" id="studyBackBtn">← 뒤로</button>
      </div>
      <div class="study-list" id="studyList"></div>
    </div>
  </section>

  <!-- Quiz screen -->
  <section id="screen-quiz" class="screen">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">1 / 10</div>
      </div>

      <div class="q-meta" id="qMeta"></div>
      <div class="q-hint" id="qHint"></div>
      <div class="q-sentence" id="qSentence"></div>

      <div id="answerArea"></div>

      <div class="feedback" id="feedback"></div>

      <div class="quiz-footer">
        <button class="btn btn-ghost" id="quitBtn">그만 풀기</button>
        <button class="btn btn-primary" id="nextBtn" disabled>다음 문제 →</button>
      </div>
    </div>
  </section>

  <!-- Result screen -->
  <section id="screen-result" class="screen">
    <div class="card">
      <div class="result-score">
        <div class="big" id="scoreBig">0 / 0</div>
        <div class="sub" id="scoreSub"></div>
      </div>

      <div class="wrong-list" id="wrongListWrap" style="display:none;">
        <h3>다시 볼 단어</h3>
        <div id="wrongList"></div>
      </div>

      <button class="letter-btn" id="letterBtn">💌 다 풀었으면, 편지 열어보기</button>
      <div class="letter-box" id="letterBox"></div>

      <div class="result-actions">
        <button class="btn btn-ghost" id="retryBtn">다시 풀기</button>
        <button class="btn btn-ghost" id="backBtn">다른 카테고리</button>
      </div>
    </div>
  </section>
</div>

/* ---------------- App state ---------------- */
let quizWords = [];
let currentIndex = 0;
let score = 0;
let wrongWords = [];
let currentType = "fill";
let answered = false;

const screenSelect = document.getElementById("screen-select");
const screenQuiz = document.getElementById("screen-quiz");
const screenResult = document.getElementById("screen-result");
const screenStudy = document.getElementById("screen-study");

function showScreen(el){
  [screenSelect, screenQuiz, screenResult, screenStudy].forEach(s => s.classList.remove("active"));
  el.classList.add("active");
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---------------- Category select screen ---------------- */
let appMode = "quiz"; // "quiz" | "study"

function renderCategoryGrid(){
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  for(const catId of Object.keys(CATEGORIES)){
    const count = WORDS.filter(w => w.cat == catId).length;
    const best = localStorage.getItem("ielts100_best_cat_"+catId);
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    const quizLen = Math.min(count, 15);
    const badge = appMode === "quiz"
      ? `${quizLen}문제${best ? " · 최고 "+best+"점" : ""}`
      : `${count}개 단어 보기`;
    btn.innerHTML = `<div class="num">CATEGORY ${catId}</div>
      <div class="name">${CATEGORIES[catId]}</div>
      <div class="best">${badge}</div>`;
    btn.onclick = () => {
      const words = WORDS.filter(w => w.cat == catId);
      if(appMode === "quiz") startQuiz(words, catId);
      else startStudy(words, `CATEGORY ${catId} · ${CATEGORIES[catId]}`);
    };
    grid.appendChild(btn);
  }
}

function updateModeUI(){
  document.getElementById("modeQuizBtn").classList.toggle("active", appMode === "quiz");
  document.getElementById("modeStudyBtn").classList.toggle("active", appMode === "study");
  document.getElementById("selectTitle").textContent = appMode === "quiz"
    ? "카테고리를 골라서 풀어보세요"
    : "카테고리를 골라서 뜻과 예문을 살펴보세요";
  document.getElementById("selectSub").textContent = appMode === "quiz"
    ? "카테고리당 랜덤 15문제 · 빈칸/객관식 랜덤 출제"
    : "퀴즈 없이 단어 뜻과 예문만 훑어보는 모드예요";
  document.getElementById("allBtn").textContent = appMode === "quiz"
    ? "전체 어휘 랜덤 30문제 도전하기 💪"
    : "전체 단어 목록 보기 📖";
  renderCategoryGrid();
}

document.getElementById("modeQuizBtn").onclick = () => { appMode = "quiz"; updateModeUI(); };
document.getElementById("modeStudyBtn").onclick = () => { appMode = "study"; updateModeUI(); };

document.getElementById("allBtn").onclick = () => {
  if(appMode === "quiz") startQuiz(WORDS, "all");
  else startStudy(WORDS, `전체 ${WORDS.length}개 단어`);
};

/* ---------------- Study (뜻 보기) screen ---------------- */
function startStudy(words, title){
  document.getElementById("studyTitle").textContent = title;
  const list = document.getElementById("studyList");
  list.innerHTML = "";
  words.forEach(w => {
    const filled = w.sentence.replace("___", `<mark>${w.word}</mark>`);
    const item = document.createElement("div");
    item.className = "study-item";
    item.innerHTML = `
      <div class="w-row">
        <span class="w-word">${w.word}</span>
        <span class="w-pos">(${w.pos})</span>
      </div>
      <div class="w-meaning">${w.meaning}</div>
      <div class="w-sentence">${filled}</div>`;
    list.appendChild(item);
  });
  showScreen(screenStudy);
}
document.getElementById("studyBackBtn").onclick = () => {
  showScreen(screenSelect);
};

/* ---------------- Quiz logic ---------------- */
let currentCatKey = null;
let currentCategoryWords = [];
const CATEGORY_QUIZ_LEN = 15;
const ALL_QUIZ_LEN = 30;

function startQuiz(words, catKey){
  currentCategoryWords = words;
  const cap = catKey === "all" ? ALL_QUIZ_LEN : CATEGORY_QUIZ_LEN;
  quizWords = shuffle(words).slice(0, Math.min(cap, words.length));
  currentIndex = 0;
  score = 0;
  wrongWords = [];
  currentCatKey = catKey;
  showScreen(screenQuiz);
  renderQuestion();
}

function pickDistractors(correctWord){
  const pool = WORDS.filter(w => w.word !== correctWord.word);
  return shuffle(pool).slice(0,3).map(w => w.word);
}

function renderQuestion(){
  answered = false;
  document.getElementById("nextBtn").disabled = true;
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback";
  feedback.innerHTML = "";

  const total = quizWords.length;
  const w = quizWords[currentIndex];

  document.getElementById("progressLabel").textContent = `${currentIndex+1} / ${total}`;
  document.getElementById("progressFill").style.width = `${(currentIndex/total)*100}%`;

  document.getElementById("qMeta").textContent = `CATEGORY ${w.cat} · ${CATEGORIES[w.cat]}`;
  document.getElementById("qHint").textContent = `힌트: ${w.meaning} (${w.pos})`;
  document.getElementById("qSentence").innerHTML = w.sentence.replace("___", '<span class="blank">______</span>');

  currentType = w.phrase ? "mc" : (Math.random() < 0.4 ? "fill" : "mc");

  const area = document.getElementById("answerArea");
  area.innerHTML = "";

  if(currentType === "fill"){
    area.innerHTML = `
      <div class="answer-input-row">
        <input type="text" class="answer-input" id="fillInput" placeholder="빈칸에 들어갈 단어를 입력하세요" autocomplete="off">
        <button class="btn btn-primary" id="submitFill">확인</button>
      </div>
      <div class="hint-row">
        <button class="hint-btn" id="hintBtn" type="button">💡 힌트 보기</button>
        <span class="hint-text" id="hintText"></span>
      </div>`;
    const input = document.getElementById("fillInput");
    input.focus();
    const submit = () => checkFillAnswer(w, input.value);
    document.getElementById("submitFill").onclick = submit;
    input.addEventListener("keydown", e => { if(e.key === "Enter") submit(); });

    let hintLevel = 0;
    const maxHintLevel = Math.min(2, w.word.length - 1);
    document.getElementById("hintBtn").onclick = () => {
      hintLevel = Math.min(hintLevel + 1, maxHintLevel);
      document.getElementById("hintText").textContent = `힌트: ${w.word.slice(0, hintLevel)}...`;
      if(hintLevel >= maxHintLevel) document.getElementById("hintBtn").disabled = true;
    };
  } else {
    const options = shuffle([w.word, ...pickDistractors(w)]);
    const mcGrid = document.createElement("div");
    mcGrid.className = "mc-grid";
    options.forEach(opt => {
      const b = document.createElement("button");
      b.className = "mc-opt";
      b.textContent = opt;
      b.onclick = () => checkMcAnswer(w, opt, b, mcGrid);
      mcGrid.appendChild(b);
    });
    area.appendChild(mcGrid);
  }
}

function normalize(s){
  return s.trim().toLowerCase().replace(/\s+/g," ");
}

function checkFillAnswer(w, value){
  if(answered) return;
  answered = true;
  const correct = normalize(value) === normalize(w.word);
  document.getElementById("submitFill").disabled = true;
  document.getElementById("fillInput").disabled = true;
  applyFeedback(w, correct);
}

function checkMcAnswer(w, chosen, btnEl, mcGrid){
  if(answered) return;
  answered = true;
  const correct = normalize(chosen) === normalize(w.word);
  [...mcGrid.children].forEach(b => {
    b.disabled = true;
    if(normalize(b.textContent) === normalize(w.word)) b.classList.add("correct");
    else if(b === btnEl) b.classList.add("wrong");
  });
  applyFeedback(w, correct);
}

function applyFeedback(w, correct){
  const feedback = document.getElementById("feedback");
  feedback.classList.add("show", correct ? "correct" : "wrong");
  if(correct){
    score++;
    feedback.innerHTML = `✅ 정답이에요! <span class="ans">${w.word}</span> — ${w.meaning}`;
  } else {
    wrongWords.push(w);
    feedback.innerHTML = `❌ 아쉬워요. 정답은 <span class="ans">${w.word}</span> — ${w.meaning}`;
  }
  document.getElementById("nextBtn").disabled = false;
}

document.getElementById("nextBtn").onclick = () => {
  if(currentIndex < quizWords.length - 1){
    currentIndex++;
    renderQuestion();
  } else {
    finishQuiz();
  }
};

document.getElementById("quitBtn").onclick = () => {
  showScreen(screenSelect);
};

function finishQuiz(){
  document.getElementById("progressFill").style.width = "100%";
  const total = quizWords.length;

  if(currentCatKey !== null){
    const key = "ielts100_best_cat_"+currentCatKey;
    const prevBest = parseInt(localStorage.getItem(key) || "0", 10);
    if(score > prevBest) localStorage.setItem(key, String(score));
  }

  document.getElementById("scoreBig").textContent = `${score} / ${total}`;
  const pct = Math.round((score/total)*100);
  let tier = "";
  if(pct === 100) tier = "완벽해요! 퍼펙트 스코어 🏆";
  else if(pct >= 80) tier = "훌륭해요! 거의 다 맞혔어요 👏";
  else if(pct >= 50) tier = "잘했어요, 조금만 더 복습해봐요 🙂";
  else tier = "다시 한 번 복습하면 금방 늘 거예요 💪";
  document.getElementById("scoreSub").textContent = `정답률 ${pct}% · ${tier}`;

  const wrongWrap = document.getElementById("wrongListWrap");
  const wrongList = document.getElementById("wrongList");
  wrongList.innerHTML = "";
  if(wrongWords.length > 0){
    wrongWrap.style.display = "block";
    wrongWords.forEach(w => {
      const row = document.createElement("div");
      row.className = "wrong-item";
      row.innerHTML = `<span><b>${w.word}</b> (${w.pos})</span><span>${w.meaning}</span>`;
      wrongList.appendChild(row);
    });
  } else {
    wrongWrap.style.display = "none";
  }

  document.getElementById("letterBox").classList.remove("show");
  document.getElementById("letterBox").innerHTML = "";
  document.getElementById("letterBtn").style.display = "block";

  renderCategoryGrid();
  showScreen(screenResult);
}

document.getElementById("letterBtn").onclick = () => {
  const box = document.getElementById("letterBox");
  box.innerHTML = LETTER_MESSAGE.map(line => `<p>${line}</p>`).join("") +
    `<div class="signature">${SIGNATURE}</div>`;
  for(let i=0;i<24;i++){
    const h = document.createElement("span");
    h.className = "heart";
    h.textContent = ["💗","💕","💖","💘"][Math.floor(Math.random()*4)];
    h.style.left = Math.random()*100+"%";
    h.style.animationDuration = (1.5 + Math.random()*1.5)+"s";
    h.style.animationDelay = (Math.random()*0.8)+"s";
    box.appendChild(h);
  }
  box.classList.add("show");
  document.getElementById("letterBtn").style.display = "none";
};

document.getElementById("retryBtn").onclick = () => {
  startQuiz(currentCategoryWords, currentCatKey);
};
document.getElementById("backBtn").onclick = () => {
  renderCategoryGrid();
  showScreen(screenSelect);
};

renderCategoryGrid();
</script>
